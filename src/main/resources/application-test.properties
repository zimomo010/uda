### 测试环境

# 服务端口
server.port=10101

## redis单节点配置
spring.redis.host=redis-headless
spring.redis.port=6379
spring.redis.database=0
spring.redis.password=benefitunion!@


spring.jpa.open-in-view=false
#spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.show-sql=true

#log dir
log.dir=/home/appdeploy/logs/gj-web-api

# eureka
eureka.client.serviceUrl.defaultZone=http://eureka:10011/gj-eureka/eureka/
eureka.instance.prefer-ip-address=true
feign.client.config.default.connectTimeout=30000
feign.client.config.default.readTimeout=30000

